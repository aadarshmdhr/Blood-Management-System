<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings - Blood Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-1 sidebar">
                <a href="dashboard.html"><img class="logo" src="img/logo-bg.png"></a>
                <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="donors.html"><i class="bi bi-person"></i> Donors</a>
                <a href="blood-request.html"><i class="bi bi-droplet"></i> Blood Requests</a>
                <a href="blood-bank.html"><i class="bi bi-hospital"></i> Blood Bank</a>
                <a href="map.html"><i class="bi bi-map"></i> Map</a>
                <a href="settings.html" class="active"><i class="bi bi-gear"></i> Settings</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-11 p-4">

                <!-- Topbar -->
                <div class="topbar d-flex justify-content-between align-items-center mb-4 shadow-sm">
                    <h3 class="fw-bold text-danger">Settings</h3>
                </div>

                <!-- Tabs -->
                <ul class="nav nav-tabs" id="settingsTab" role="tablist">

                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#profile">
                            <i class="bi bi-person"></i> Profile
                        </button>
                    </li>

                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#password">
                            <i class="bi bi-lock"></i> Password
                        </button>
                    </li>

                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#notifications">
                            <i class="bi bi-bell"></i> Notifications
                        </button>
                    </li>

                </ul>

                <!-- Tab Content -->
                <div class="tab-content mt-4">

                    <!-- Profile -->
                    <div class="tab-pane fade show active" id="profile">

                        <div class="card shadow">
                            <div class="card-body">

                                <h5 class="mb-3 fw-semibold">Update Profile</h5>

                                <form>
                                    <div class="row g-3">

                                        <div class="col-md-6">
                                            <label class="form-label">Full Name</label>
                                            <input type="text" class="form-control" value="">
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" value="">
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label">Phone</label>
                                            <input type="text" class="form-control" value="">
                                        </div>

                                    </div>

                                    <button class="btn btn-danger mt-4 fw-semibold">Save Changes</button>
                                </form>

                            </div>
                        </div>

                    </div>

                    <!-- Password -->
                    <div class="tab-pane fade" id="password">

                        <div class="card shadow">
                            <div class="card-body">

                                <h5 class="mb-3 fw-semibold">Change Password</h5>

                                <form>
                                    <div class="row g-3">

                                        <div class="col-md-6">
                                            <label class="form-label">Current Password</label>
                                            <input type="password" class="form-control">
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label">New Password</label>
                                            <input type="password" class="form-control">
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label">Confirm Password</label>
                                            <input type="password" class="form-control">
                                        </div>

                                    </div>

                                    <button class="btn btn-danger mt-4 fw-semibold">Update Password</button>
                                </form>

                            </div>
                        </div>

                    </div>

                    <!-- Notifications -->
                    <div class="tab-pane fade" id="notifications">

                        <div class="card shadow">
                            <div class="card-body">

                                <h5 class="mb-3 fw-semibold">Notification Settings</h5>

                                <form>

                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" checked>
                                        <label class="form-check-label">Email Notifications</label>
                                    </div>

                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" checked>
                                        <label class="form-check-label">SMS Alerts</label>
                                    </div>

                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox">
                                        <label class="form-check-label">Emergency Alerts</label>
                                    </div>

                                    <button class="btn btn-danger mt-3 fw-semibold">Save Settings</button>

                                </form>

                            </div>
                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
