<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - Blood Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

    <style>
        .profile-card {
            border-radius: 15px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #dc3545;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-1 sidebar">
                <a href="dashboard.html"><img class="logo" src="img/logo-bg.png"></a>

                <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="donors.html"><i class="bi bi-person"></i> Donors</a>
                <a href="bloodrequest.html"><i class="bi bi-droplet"></i> Blood Requests</a>
                <a href="bloodbank.html"><i class="bi bi-hospital"></i> Blood Bank</a>
                <a href="map.html"><i class="bi bi-map"></i> Map</a>
                <a href="settings.html"><i class="bi bi-gear"></i> Settings</a>
            </div>

            <!-- Main Content -->
            <div class="col-md-11 p-4">

                <h3 class="fw-bold text-danger mb-4">My Profile</h3>

                <div class="row g-4">

                    <!-- Profile Card -->
                    <div class="col-md-4">
                        <div class="card shadow text-center profile-card p-4">

                            <img src="img/user.png" class="profile-img mb-3">

                            <h5 class="fw-bold">Admin User</h5>
                            <p class="text-muted">admin@mail.com</p>

                            <span class="badge bg-danger">Administrator</span>

                            <div class="mt-3">
                                <button class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-camera"></i> Change Photo
                                </button>
                            </div>

                        </div>

                        <!-- Stats -->
                        <div class="card shadow mt-4 p-3 text-center">
                            <h6>Total Donations</h6>
                            <h3 class="text-danger">12</h3>
                        </div>
                    </div>

                    <!-- Edit Form -->
                    <div class="col-md-8">
                        <div class="card shadow profile-card">
                            <div class="card-body">

                                <h5 class="mb-3">Edit Profile</h5>

                                <form>
                                    <div class="row g-3">

                                        <!-- Name -->
                                        <div class="col-md-6">
                                            <label class="form-label">Full Name</label>
                                            <input type="text" class="form-control" value="Admin User">
                                        </div>

                                        <!-- Email -->
                                        <div class="col-md-6">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" value="admin@mail.com">
                                        </div>

                                        <!-- Phone -->
                                        <div class="col-md-6">
                                            <label class="form-label">Phone</label>
                                            <input type="text" class="form-control" value="9800000000">
                                        </div>

                                        <!-- Address -->
                                        <div class="col-md-6">
                                            <label class="form-label">Address</label>
                                            <input type="text" class="form-control" value="Kathmandu">
                                        </div>

                                        <!-- Blood Group -->
                                        <div class="col-md-6">
                                            <label class="form-label">Blood Group</label>
                                            <select class="form-select">
                                                <option selected>B+</option>
                                                <option>A+</option>
                                                <option>O+</option>
                                            </select>
                                        </div>

                                    </div>

                                    <button class="btn btn-danger mt-4 px-4">
                                        <i class="bi bi-save"></i> Update Profile
                                    </button>

                                </form>

                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
