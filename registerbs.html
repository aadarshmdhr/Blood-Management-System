<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header class="py-5 mt-5">
        <div class="container">
            <div class="row">

                <!-- Logo -->
                <div class="col-lg-8">
                    <img class="rounded-pill" src="img/logo.webp" alt="">
                </div>

                <!-- Form -->
                <div class="col-lg-4 form">
                    <h1 class="text-danger fw-bold text-center">Create Account</h1>

                    <form class="py-5">

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <div class="position-relative">
                                <i
                                    class="bi bi-person-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="text" class="form-control ps-5" placeholder="Enter full name">
                            </div>
                        </div>

                        <!-- Address -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Address</label>
                            <div class="position-relative">
                                <i
                                    class="bi bi-geo-alt-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="text" class="form-control ps-5" placeholder="Enter address">
                            </div>
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <div class="position-relative">
                                <i
                                    class="bi bi-telephone-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="number" class="form-control ps-5" placeholder="Enter phone number">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <div class="position-relative">
                                <i
                                    class="bi bi-envelope-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="email" class="form-control ps-5" placeholder="Enter email address">
                            </div>
                        </div>

                        <!-- Blood Group -->
                        <div class="mb-3">
                            <div class="position-relative">
                                <i
                                    class="bi bi-droplet-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <select class="form-select ps-5">
                                    <option selected>Select Blood Group</option>
                                    <option>A+</option>
                                    <option>A-</option>
                                    <option>B+</option>
                                    <option>B-</option>
                                    <option>O+</option>
                                    <option>O-</option>
                                    <option>AB+</option>
                                    <option>AB-</option>
                                </select>
                            </div>
                        </div>

                        <!-- Gender -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Gender</label><br>
                            <input type="radio" name="gender"> Male
                            <input type="radio" name="gender" class="ms-3"> Female
                            <input type="radio" name="gender" class="ms-3"> Other
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="position-relative">
                                <i
                                    class="bi bi-lock-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="password" class="form-control ps-5" placeholder="Enter password">
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Confirm Password</label>
                            <div class="position-relative">
                                <i
                                    class="bi bi-shield-lock-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                <input type="password" class="form-control ps-5" placeholder="Confirm password">
                            </div>
                        </div>

                        <!-- Button -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-custom px-4">Register</button>
                        </div>

                    </form>

                    <p class="text-center">
                        Already have an account?
                        <a href="loginbs.html" class="text-danger fw-semibold">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
