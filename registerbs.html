<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header class="py-5 mt-5">
        <div class="container">
            <div class="row">

                <!-- Logo -->
                <div class="col-lg-8">
                    <img class="rounded-pill" src="img/logo.webp" alt="">
                </div>

                <!-- Form -->
                <div class="col-lg-4 form">
                    <h1 class="text-danger fw-bold text-center">Create Account</h1>

                    <form class="py-5">
                        <div class="mb-3">
                            <label for="exampleInputFname" class="form-label fw-semibold">Full Name</label>
                            <input type="name" class="form-control" id="exampleInputFname" aria-describedby="nameHelp">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputAddress" class="form-label fw-semibold">Address</label>
                            <input type="address" class="form-control" id="exampleInputEmail1"
                                aria-describedby="addressHelp">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPhone" class="form-label fw-semibold">Phone Number</label>
                            <input type="number" class="form-control" id="exampleInputEmail1"
                                aria-describedby="phoneHelp">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control" id="exampleInputEmail1"
                                aria-describedby="emailHelp">
                        </div>
                        <div class="mb-3">
                            <select class="form-select">
                                <option selected>Select Blood Group</option>
                                <option>A+</option>
                                <option>A-</option>
                                <option>B+</option>
                                <option>B-</option>
                                <option>O+</option>
                                <option>O-</option>
                                <option>AB+</option>
                                <option>AB-</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Gender</label><br>
                            <input type="radio" name="gender"> Male
                            <input type="radio" name="gender" class="ms-3"> Female
                            <input type="radio" name="gender" class="ms-3"> Other
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control" id="exampleInputPassword">
                        </div>
                        <div class="mb-4">
                            <label for="exampleInputPassword1" class="form-label fw-semibold">Confirm Password</label>
                            <input type="password" class="form-control" id="exampleInputPassword1">
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-custom">Register</button>
                        </div>
                    </form>

                    <p class="text-center">
                        Already have an account?
                        <a href="loginbs.html" class="text-danger fw-semibold">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
