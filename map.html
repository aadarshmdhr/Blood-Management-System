<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map - Blood Management System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-1 sidebar">
      <a href="dashboard.html"><img class="logo" src="img/logo-bg.png"></a>

      <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="donors.html"><i class="bi bi-person"></i> Donors</a>
      <a href="bloodrequest.html"><i class="bi bi-droplet"></i> Blood Requests</a>
      <a href="#"><i class="bi bi-hospital"></i> Blood Bank</a>
      <a href="map.html" class="active"><i class="bi bi-map"></i> Map</a>
      <a href="#"><i class="bi bi-gear"></i> Settings</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-11 p-4">

      <!-- Topbar -->
      <div class="topbar d-flex justify-content-between align-items-center mb-4 shadow-sm">
        <h3 class="fw-bold text-danger">Hospital & Blood Bank Map</h3>
      </div>

      <!-- Search -->
      <div class="card shadow-sm p-3 mb-4">
        <div class="row g-3">

          <div class="col-md-8">
            <input type="text" class="form-control" placeholder="Search hospital or blood bank...">
          </div>

          <div class="col-md-2 d-grid">
            <button class="btn btn-danger fw-semibold">Search</button>
          </div>

          <div class="col-md-2 d-grid">
            <button class="btn btn-outline-danger fw-semibold">
              <i class="bi bi-geo-alt"></i> My Location
            </button>
          </div>

        </div>
      </div>

      <!-- Map -->
      <div class="card shadow map-container">
        <div class="card-body p-2">

          <iframe 
            src="https://www.google.com/maps?q=hospital+in+Kathmandu&output=embed">
          </iframe>

        </div>
      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
