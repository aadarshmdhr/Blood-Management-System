<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />

    <style>
      body {
        background: linear-gradient(135deg, #ff4d4d, #b30000);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card-box {
        border-radius: 20px;
        padding: 35px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
      }
    </style>
  </head>

  <body>
    <div class="card-box">
      <!-- Title -->
      <div class="text-center mb-4">
        <h4 class="fw-bold text-danger">Forgot Password</h4>
        <p class="text-muted small">Enter your email to reset your password</p>
      </div>

      <!-- Form -->
      <form>
        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email Address</label>

          <div class="position-relative">
            <i
              class="bi bi-envelope-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"
            ></i>
            <input
              type="email"
              class="form-control ps-5"
              placeholder="Enter your email"
            />
          </div>
        </div>

        <!-- Button -->
        <div class="d-grid">
          <button type="submit" class="btn btn-danger fw-semibold">
            <i class="bi bi-send"></i> Send Reset Link
          </button>
        </div>
      </form>

      <!-- Back -->
      <div class="text-center mt-3">
        <a href="loginbs.html" class="text-danger text-decoration-none">
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
