<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="py-5 mt-5">
      <div class="container">
        <div class="row">
          <!-- Logo -->
          <div class="col-lg-8">
            <img class="rounded-pill" src="img/logo.webp" alt="" />
          </div>

          <!-- Form -->
          <div class="col-lg-4 form">
            <h1 class="text-danger fw-bold text-center">
              Blood Management System
            </h1>

            <form class="py-5">
              <!-- Email / Phone -->
              <div class="mb-3">
                <label class="form-label">Email address / Phone Number</label>

                <div class="position-relative">
                  <i
                    class="bi bi-envelope-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"
                  ></i>
                  <input
                    type="text"
                    class="form-control ps-5"
                    placeholder="Enter email or phone"
                  />
                </div>

                <div class="form-text">
                  We'll never share your details with anyone else.
                </div>
              </div>

              <!-- Password -->
              <div class="mb-4">
                <label class="form-label">Password</label>

                <div class="position-relative">
                  <i
                    class="bi bi-lock-fill position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"
                  ></i>
                  <input
                    type="password"
                    class="form-control ps-5"
                    placeholder="Enter password"
                  />
                </div>

                <div class="form-text">Your password is safe with us.</div>
              </div>

              <!-- Checkbox -->
              <div
                class="mb-4 form-check d-flex justify-content-between align-items-center"
              >
                <div>
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="remember"
                  />
                  <label class="form-check-label" for="remember"
                    >Remember Me</label
                  >
                </div>
                <a href="" class="text-danger text-decoration-none fw-semibold"
                  >Forgot Password?</a
                >
              </div>

              <!-- Button -->
              <div class="text-center">
                <button type="submit" class="btn btn-custom">Login</button>
              </div>
            </form>

            <p class="text-center">
              Don't have an account?
              <a href="register.html" class="text-danger fw-semibold"
                >Sign Up</a
              >
            </p>
          </div>
        </div>
      </div>
    </header>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
